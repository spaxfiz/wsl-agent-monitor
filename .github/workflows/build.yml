name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Create virtual environment
        shell: powershell
        run: python -m venv .venv

      - name: Install dependencies
        shell: powershell
        run: .\.venv\Scripts\python.exe -m pip install --upgrade pip; .\.venv\Scripts\python.exe -m pip install -r requirements-build.txt

      - name: Run tests before build
        shell: powershell
        run: .\.venv\Scripts\python.exe -m unittest discover -s tests -v

      - name: Build executable
        shell: cmd
        run: build_exe.bat

      - name: Package zip artifact
        shell: powershell
        run: Compress-Archive -Path dist/WSLAgentMonitor.exe -DestinationPath dist/WSLAgentMonitor-windows-x64.zip -Force

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: WSLAgentMonitor-windows
          path: dist/WSLAgentMonitor-windows-x64.zip
